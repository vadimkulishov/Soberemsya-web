<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberemsya Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="login-header">
                <h1>Soberemsya</h1>
                <p>Admin Panel</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="login-error" class="error" style="display:none;"></p>
            </form>
        </div>

        <!-- Admin View -->
        <div id="admin-view" class="view">
            <div class="admin-header">
                <h1>👨‍💼 User Management</h1>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search by name or email...">
                <button id="search-btn" class="btn btn-secondary">Search</button>
            </div>

            <!-- Users Table -->
            <div class="users-container">
                <table id="users-table" class="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Current Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>

            <!-- Loading -->
            <div id="loading" class="loading" style="display:none;">
                <p>Loading...</p>
            </div>

            <!-- Error message -->
            <p id="error-message" class="error" style="display:none;"></p>
        </div>

        <!-- Role Change Modal -->
        <div id="role-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h2>Change User Role</h2>
                <p id="modal-user-info"></p>
                
                <div class="form-group">
                    <label for="role-select">New Role:</label>
                    <select id="role-select" name="role">
                        <option value="user">User</option>
                        <option value="organizer">Organizer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <div class="modal-buttons">
                    <button id="confirm-role-btn" class="btn btn-primary">Confirm</button>
                    <button id="cancel-role-btn" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
